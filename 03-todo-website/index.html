<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="logo">Todo Website</div>
    </header>
    <main>
        <section class="add-todo-page">
            <form id="todo-form">
                <input type="text" id="input-todo" autocomplete="off" placeholder="What is in your mind?" autofocus>

                <input type="submit" id="submit-button" value="Submit">
            </form>
        </section>

        <section class="list-todo-page">
            <ul id="todos-list"></ul>
        </section>
    </main>
    <footer></footer>

    <script src="script.js"></script>
</body>
</html>
