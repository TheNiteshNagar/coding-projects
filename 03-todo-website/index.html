<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="logo">Todo</div>
    </header>
    <main>
        <section class="todo-form-section">
            <form id="todo-form">
                <label for="todo">Enter Todo:</label>
                <input type="text" id="todo" name="todo" placeholder="Add Your Task" autocomplete="off">
                <input type="submit" value="Submit" class="submit-button">
            </form>
        </section>
        <section class="todos">
            <ul id="todo-lists">
                
            </ul>
        </section>
    </main>
    <footer></footer>

    <script src="script.js"></script>
</body>
</html>
